<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ORDOCX v8</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@4.0.379/build/pdf.min.js"></script>
<script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/pdf-lib/dist/pdf-lib.min.js"></script>

</head>

<body>

<h1>ORDOCX v8 – Automatización Documental IA</h1>

<section class="panel">
<h3>Configuración API Gemini</h3>
<input id="apiKey" placeholder="AIza...">
<button onclick="validateAPI()">Validar</button>
<span id="apiStatus">No validada</span>
</section>

<section class="panel">
<h3>Entrada de Información (Fuente)</h3>
<input type="file" id="sourceFiles" multiple>
<ul id="fileList"></ul>
</section>

<section class="panel">
<h3>Documento Destino (Plantilla)</h3>
<input type="file" id="templateFile">
</section>

<section class="panel">
<h3>Procesamiento</h3>
<button onclick="processAll()">Procesar Información</button>
<div id="progress"></div>
</section>

<section class="panel">
<h3>Resultados</h3>
<pre id="output"></pre>
</section>

<section class="panel">
<button onclick="exportExcel()">Exportar Excel</button>
<button onclick="exportPDF()">Exportar PDF</button>
</section>

<script src="engine.js"></script>

</body>
</html>
