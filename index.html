
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ORDOCX</title>

<link rel="icon" href="data:,">
<link rel="stylesheet" href="style.css">

</head>

<body>

<h2>ORDOCX</h2>

<div class="panel">
API KEY
<input id="apiKey" style="width:100%">
</div>

<div class="panel">
<h3>Documentos Fuente</h3>
<input type="file" multiple id="fileInput">
<div id="fileList"></div>
</div>

<div class="panel">
<h3>Documento Destino (Plantilla)</h3>
<input type="file" id="templateFile">
</div>

<div class="panel">
<h3>Instrucciones</h3>
<textarea id="instructions"></textarea>
</div>

<div class="panel">
<button onclick="processBatch()">Procesar documentos</button>
<div id="status" class="status"></div>
</div>

<div class="panel">
<h3>Resultados</h3>
<pre id="results"></pre>
<button onclick="exportResult()">Descargar Resultado</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
<script src="engine.js"></script>

</body>
</html>
