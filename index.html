
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ORDOCX</title>
<style>
body{background:#0f172a;color:white;font-family:Arial}
.panel{background:#1e293b;padding:15px;margin:10px;border-radius:6px}
button{padding:8px 12px;margin-top:5px}
</style>
</head>
<body>

<div class="panel">
API KEY<br>
<input id="apiKey" style="width:400px">
</div>

<div class="panel">
<h3>Documentos Fuente</h3>
<input type="file" multiple onchange="addFiles(this)">
<div id="fileList"></div>
</div>

<div class="panel">
<h3>Instrucciones</h3>
<textarea id="instructions" style="width:100%;height:100px"></textarea>
</div>

<div class="panel">
<button onclick="processBatch()">Procesar documentos</button>
</div>

<div class="panel">
<h3>Resultados</h3>
<pre id="results"></pre>
<button onclick="exportResult()">Descargar Resultado</button>
</div>

<script src="engine.js"></script>

</body>
</html>
